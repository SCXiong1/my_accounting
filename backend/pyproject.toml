[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "ANN"]
ignore = ["ANN401"]  # allow Any for SQLAlchemy event handlers and similar

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["ANN"]  # skip type annotations in tests
"conftest.py" = ["ANN"]
"alembic/*.py" = ["ANN"]
"alembic/versions/*.py" = ["E501"]  # auto-generated migration files
